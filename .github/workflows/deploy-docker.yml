name: Deploy StockSquad (Docker) to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY_NAME: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
  IMAGE_NAME: stocksquad

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy Infrastructure (Container version)
      if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy-infra]')
      uses: azure/arm-deploy@v1
      with:
        subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
        template: ./infra/main-docker.bicep
        parameters: >
          azureOpenAiEndpoint=${{ secrets.AZURE_OPENAI_ENDPOINT }}
          azureOpenAiApiKey=${{ secrets.AZURE_OPENAI_API_KEY }}
          azureOpenAiDeploymentName=${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          azureOpenAiEmbeddingDeploymentName=${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME }}
          telegramBotToken=${{ secrets.TELEGRAM_BOT_TOKEN }}
          xaiApiKey=${{ secrets.XAI_API_KEY }}
          alphaVantageApiKey=${{ secrets.ALPHA_VANTAGE_API_KEY }}
          environment=prod
          appServiceSku=B1

    - name: Log in to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY_NAME }}.azurecr.io
        username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
        cache-from: type=registry,ref=${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
        cache-to: type=inline

    - name: Deploy to Azure Web App (Container)
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        images: ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

    - name: Health Check
      continue-on-error: true
      run: |
        echo "Waiting 60s for container to start..."
        sleep 60

        WEBAPP_URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        echo "Checking health at $WEBAPP_URL/api/reports"

        for i in {1..5}; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WEBAPP_URL/api/reports" || echo "000")

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
            echo "✅ Health check passed (HTTP $STATUS)"
            exit 0
          fi

          echo "⏳ Attempt $i/5: HTTP $STATUS - waiting 30s..."
          sleep 30
        done

        echo "⚠️ Health check failed after 5 attempts"

    - name: Deployment Summary
      run: |
        echo "========================================="
        echo "🚀 Docker Deployment Complete!"
        echo "========================================="
        echo "App URL: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        echo "Image: ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
        echo "Resource Group: ${{ secrets.AZURE_RESOURCE_GROUP }}"
        echo "========================================="
